<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Facturas App</title>
</head>

<body>

<h1>Registrar Factura</h1>

<input id="item" placeholder="Item"><br><br>
<input id="descripcion" placeholder="Descripción"><br><br>
<input id="cantidad" type="number" placeholder="Cantidad"><br><br>
<input id="precio" type="number" placeholder="Precio"><br><br>
<input id="comercio" placeholder="Comercio"><br><br>

<button onclick="guardar()">Guardar</button>

<script>
function guardar() {

fetch("https://script.google.com/macros/s/AKfycbzkgn0OCA_P9M3Ns8pCcpd6gpbu5iUPwH863ekl5hwgvJDVTz623GI6L1LMENbv0psf/exec", {
  method: "POST",
  body: JSON.stringify({
    item: document.getElementById("item").value,
    descripcion: document.getElementById("descripcion").value,
    cantidad: document.getElementById("cantidad").value,
    precio: document.getElementById("precio").value,
    comercio: document.getElementById("comercio").value
  })
});

alert("Factura enviada");
}
</script>

</body>
</html>
